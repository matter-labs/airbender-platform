name: Release

permissions: {}

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      tag:
        description: "Tag to use for the release (v<version>)."
        type: string
        required: true
        default: ""

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: read
    outputs:
      tag_name: ${{ steps.release_info.outputs.tag_name }}
      version_name: ${{ steps.release_info.outputs.version_name }}
      release_name: ${{ steps.release_info.outputs.release_name }}
      prerelease: ${{ steps.release_info.outputs.prerelease }}
      changelog: ${{ steps.build_changelog.outputs.changelog || '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ inputs.tag || '' }}

      - name: Compute release name and tag
        id: release_info
        run: |
          TAG="${{ inputs.tag }}"

          echo "tag_name=${TAG}" >> $GITHUB_OUTPUT
          echo "version_name=${TAG}" >> $GITHUB_OUTPUT
          echo "release_name=cargo-airbender ${TAG}" >> $GITHUB_OUTPUT
          echo "prerelease=false" >> $GITHUB_OUTPUT

      - name: Print release info
        run: |
          echo tag_name: "${{ steps.release_info.outputs.tag_name }}"
          echo version_name: "${{ steps.release_info.outputs.version_name }}"
          echo release_name: "${{ steps.release_info.outputs.release_name }}"
          echo prerelease: "${{ steps.release_info.outputs.prerelease }}"

  build-man:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    needs: prepare
    outputs:
      man_file: ${{ steps.man.outputs.cargo_airbender_man }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ inputs.tag || '' }}
      - uses: moonrepo/setup-rust@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          cache: false
      - name: Build debug binary
        run: |
          cargo build --bin cargo-airbender
      - name: Build man page
        id: man
        env:
          VERSION_NAME: ${{ needs.prepare.outputs.version_name }}
        run: |
          sudo apt-get -y install help2man
          help2man -N ./target/debug/cargo-airbender > cargo-airbender.1
          gzip cargo-airbender.1
          tar -czvf "cargo_airbender_man_${VERSION_NAME}.tar.gz" cargo-airbender.1.gz
          echo "cargo_airbender_man=cargo_airbender_man_${VERSION_NAME}.tar.gz" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.man.outputs.cargo_airbender_man }}
          path: ${{ steps.man.outputs.cargo_airbender_man }}
          retention-days: 1

  release:
    permissions:
      id-token: write
      contents: write
      attestations: write
    name: release ${{ matrix.target }} (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240
    needs: [prepare, build-man]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            svm_target_platform: linux-amd64
            platform: linux
            arch: amd64
          - runner: matterlabs-ci-runner-arm
            target: aarch64-unknown-linux-gnu
            svm_target_platform: linux-aarch64
            platform: linux
            arch: arm64
          # This is pinned to `macos-13-large` to support old SDK versions.
          # If the runner is deprecated it should be pinned to the oldest available version of the runner.
          - runner: macos-13-large
            target: x86_64-apple-darwin
            svm_target_platform: macosx-amd64
            platform: darwin
            arch: amd64
          - runner: macos-latest
            target: aarch64-apple-darwin
            svm_target_platform: macosx-aarch64
            platform: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ inputs.tag || '' }}

      - name: Install Rust toolchain
        uses: moonrepo/setup-rust@v1
        env:
          # To fix rate limiting issues with GitHub API
          GITHUB_TOKEN: ${{ github.token }}
        with:
          targets: ${{ matrix.target }}
          cache: false

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Apple M1 setup
        if: matrix.target == 'aarch64-apple-darwin'
        run: |
          brew install make
          echo "PATH=/usr/local/opt/make/libexec/gnubin:$PATH" >> $GITHUB_ENV
          echo "SDKROOT=$(xcrun -sdk macosx --show-sdk-path)" >> $GITHUB_ENV
          echo "MACOSX_DEPLOYMENT_TARGET=$(xcrun -sdk macosx --show-sdk-platform-version)" >> $GITHUB_ENV

      - name: Apple Darwin
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          brew install make
          echo "PATH=/usr/local/opt/make/libexec/gnubin:$PATH" >> $GITHUB_ENV

      - name: Build binaries
        env:
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          SVM_TARGET_PLATFORM: ${{ matrix.svm_target_platform }}
        shell: bash
        run: |
          set -eo pipefail
          target="${{ matrix.target }}"

          cargo build --release --target $target --bin cargo-airbender

          bins=(cargo-airbender)
          for name in "${bins[@]}"; do
              bin=./target/$target/release/$name
              file "$bin" || true
              ldd "$bin" || true
              $bin --version || true
              echo "${name}_bin_path=${bin}" >> $GITHUB_ENV
          done

      - name: Archive binaries
        id: artifacts
        env:
          PLATFORM_NAME: ${{ matrix.platform }}
          TARGET: ${{ matrix.target }}
          ARCH: ${{ matrix.arch }}
          VERSION_NAME: ${{ needs.prepare.outputs.version_name }}
        shell: bash
        run: |
          if [ "$PLATFORM_NAME" == "linux" ]; then
              tar -czvf "cargo_airbender_${VERSION_NAME}_${PLATFORM_NAME}_${ARCH}.tar.gz" -C ./target/${TARGET}/release cargo-airbender
              echo "file_name=cargo_airbender_${VERSION_NAME}_${PLATFORM_NAME}_${ARCH}.tar.gz" >> $GITHUB_OUTPUT
          elif [ "$PLATFORM_NAME" == "darwin" ]; then
              # We need to use gtar here otherwise the archive is corrupt.
              # See: https://github.com/actions/virtual-environments/issues/2619
              gtar -czvf "cargo_airbender_${VERSION_NAME}_${PLATFORM_NAME}_${ARCH}.tar.gz" -C ./target/${TARGET}/release cargo-airbender
              echo "file_name=cargo_airbender_${VERSION_NAME}_${PLATFORM_NAME}_${ARCH}.tar.gz" >> $GITHUB_OUTPUT
          fi
          printf "cargo_airbender_attestation=%s\n" "cargo_airbender_${VERSION_NAME}_${PLATFORM_NAME}_${ARCH}.attestation.txt" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          retention-days: 1
          name: ${{ steps.artifacts.outputs.file_name }}
          path: ${{ steps.artifacts.outputs.file_name }}

      - name: Binaries attestation
        id: attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            ${{ env.cargo_airbender_bin_path }}

      - name: Record attestation URL
        env:
          ATTESTATION_URL: ${{ steps.attestation.outputs.attestation-url }}
          CARGO_AIRBENDER_ATTESTATION: ${{ steps.artifacts.outputs.cargo_airbender_attestation }}
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' "$ATTESTATION_URL" > "$CARGO_AIRBENDER_ATTESTATION"

      - name: Download man
        uses: actions/download-artifact@v6
        with:
          name: ${{ needs.build-man.outputs.man_file }}

      # Creates the release for this specific version
      - name: Create release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          name: ${{ needs.prepare.outputs.release_name }}
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          prerelease: false
          generate_release_notes: true
          files: |
            ${{ steps.artifacts.outputs.file_name }}
            ${{ steps.artifacts.outputs.cargo_airbender_attestation }}
            ${{ needs.build-man.outputs.man_file }}

  retry-on-failure:
    permissions:
      actions: write
    if: failure() && fromJSON(github.run_attempt) < 3
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run retry.yml -F run_id=${{ github.run_id }}

  # Send a Slack notification on workflow failure .
  notify-failure:
    if: failure() && fromJSON(github.run_attempt) >= 3
    name: Notify failure via Slack
    runs-on: ubuntu-latest
    needs: [prepare, build-man, release]
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_RELEASES }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: Release workflow failed after 3 attempts.\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
