name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Keep this value in sync with rust-toolchain.toml.
  RUST_TOOLCHAIN: nightly-2026-02-10
  ZKSYNC_USE_CUDA_STUBS: "true"

jobs:
  lints:
    runs-on: matterlabs-ci-runner-high-performance
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy,rustfmt,rust-src,llvm-tools-preview
      - name: Rustfmt
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  docs-check:
    if: github.event_name == 'pull_request'
    runs-on: matterlabs-ci-runner-high-performance
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rust-src,llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: mdbook
      - name: Build mdBook
        run: mdbook build docs
      - name: Build workspace rustdocs
        run: cargo doc --workspace --no-deps --locked
      - name: Generate workspace API landing page
        run: |
          python3 scripts/generate_api_index.py \
            --workspace-root . \
            --template scripts/templates/api-index.html.template \
            --output target/doc/index.html

  build-and-test:
    runs-on: matterlabs-ci-runner-high-performance
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rust-src,llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - name: Install cargo-binutils
        run: cargo install cargo-binutils --locked
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo nextest run --workspace

  cli-integration:
    runs-on: matterlabs-ci-runner-high-performance
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rust-src,llvm-tools-preview
      - name: Install cargo-binutils
        run: cargo install cargo-binutils --locked
      - name: Install cargo-airbender
        run: cargo install --path crates/cargo-airbender --locked --force
      - name: Run cargo-airbender integration flow
        run: |
          # TODO: this is a mess, but it's better than nothing -- to be properly refactored.
          tmp_dir="$(mktemp -d)"
          project_dir="$tmp_dir/smoke"

          cargo airbender new "$project_dir" --yes --name smoke --prover-backend dev --sdk-path "$PWD"
          cargo airbender build --project "$project_dir/guest"

          printf '00000001\n29000000\n' > "$tmp_dir/input.hex"

          cargo airbender run "$project_dir/guest/dist/app/app.bin" --input "$tmp_dir/input.hex"
          cargo airbender prove "$project_dir/guest/dist/app/app.bin" --input "$tmp_dir/input.hex" --output "$tmp_dir/proof.bin" --backend dev

          # Intentionally only verify command success and proof artifact presence for now.
          test -f "$tmp_dir/proof.bin"

  examples:
    runs-on: matterlabs-ci-runner-high-performance
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target/examples
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rust-src,llvm-tools-preview
      - name: Install cargo-binutils
        run: cargo install cargo-binutils --locked
      - name: Install cargo-airbender
        run: cargo install --path crates/cargo-airbender --locked --force
      - name: Build and run cycle markers example
        run: |
          cargo airbender build --project examples/cycle-markers/guest -- --locked
          cargo run --release --manifest-path examples/cycle-markers/host/Cargo.toml --locked
      - name: Build and prove fibonacci example with dev prover
        run: |
          cargo airbender build --project examples/fibonacci/guest -- --locked
          cargo run --release --manifest-path examples/fibonacci/host/Cargo.toml --locked -- --prove
      - name: Build and prove std-btreemap example with dev prover
        run: |
          cargo airbender build --project examples/std-btreemap/guest -- --locked
          cargo run --release --manifest-path examples/std-btreemap/host/Cargo.toml --locked -- --prove
      - name: Build and prove u256-add example with dev prover
        run: |
          cargo airbender build --project examples/u256-add/guest -- --locked
          cargo run --release --manifest-path examples/u256-add/host/Cargo.toml --locked -- --prove
      - name: Build and run revm-basic example
        run: |
          cargo airbender build --project examples/revm-basic/guest -- --locked
          cargo run --release --manifest-path examples/revm-basic/host/Cargo.toml --locked

  reth-block-replay:
    runs-on: matterlabs-ci-runner-high-performance
    timeout-minutes: 90
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target/reth-block-replay
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rust-src,llvm-tools-preview
      - name: Install cargo-binutils
        run: cargo install cargo-binutils --locked
      - name: Install cargo-airbender
        run: cargo install --path crates/cargo-airbender --locked --force
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Build reth-block-replay guest
        run: cargo airbender build --project examples/reth-block-replay/guest -- --locked
      - name: Generate witness-backed block
        working-directory: examples/reth-block-replay
        run: |
          set -euo pipefail
          log_file="$(mktemp)"
          trap 'rm -f "$log_file"' EXIT
          bash docker/generate-blocks.sh | tee "$log_file"
          block_num="$(awk -F= '/^BLOCK_NUM=/{print $2}' "$log_file" | tail -n 1)"
          test -n "$block_num"
          printf 'BLOCK_NUM=%s\n' "$block_num" >> "$GITHUB_ENV"
      - name: Replay block inside Airbender
        run: cargo run --release --manifest-path examples/reth-block-replay/host/Cargo.toml --locked
      - name: Stop reth dev node
        if: always()
        working-directory: examples/reth-block-replay
        run: docker compose -f docker/docker-compose.yml down -v
