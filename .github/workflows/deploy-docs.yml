name: Deploy docs

on:
  push:
    branches:
      - "main"
    tags:
      - "v*.*.*"
    paths:
      - 'docs/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/scripts/build-api-docs.sh'
      - '.github/workflows/deploy-docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/scripts/build-api-docs.sh'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag or commit to deploy the core docs. If empty, use the ref that triggered the workflow."
        required: false
        default: ""
      version:
        type: string
        description: "Version of the documentation to deploy"
        required: false
        default: "latest"

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  deploy-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DOCS_DIR: 'docs'
      API_DOCS_DIR: '${{ runner.temp }}/api-docs'
      API_ROOT_DIR: 'api'
      ENABLE_TESTS: false
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref || '' }}

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: extract-version
        shell: 'bash -ex {0}'
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#*-}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Resolve deployment version
        id: resolve-version
        shell: 'bash -eu {0}'
        run: |
          RAW_VERSION="${{ inputs.version || steps.extract-version.outputs.version || github.ref_name }}"
          if [[ "${RAW_VERSION}" == "${{ github.event.repository.default_branch }}" || "${RAW_VERSION}" == "latest" ]]; then
            DEPLOY_VERSION="latest"
          else
            DEPLOY_VERSION="${RAW_VERSION}"
          fi

          echo "raw=${RAW_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "deploy=${DEPLOY_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Install Rust toolchain
        uses: moonrepo/setup-rust@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          cache: false

      - name: Build Rust API docs
        shell: 'bash -eu {0}'
        run: |
          bash .github/scripts/build-api-docs.sh "${API_DOCS_DIR}"

      - name: Deploy docs
        uses: matter-labs/deploy-mdbooks@c72ae3825faeb7d20cbf3e67714f7253dd0ee7cb # v1
        with:
          version: ${{ steps.resolve-version.outputs.raw }}
          docs-dir: ${{ env.DOCS_DIR }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          enable-tests: ${{ env.ENABLE_TESTS }}
          deploy: ${{ github.event_name != 'pull_request' }}

      - name: Publish Rust API docs
        if: github.event_name != 'pull_request'
        shell: 'bash -euxo pipefail {0}'
        env:
          VERSION: ${{ steps.resolve-version.outputs.deploy }}
        run: |
          mkdir -p "${API_ROOT_DIR}"

          if [[ ! -f "${API_ROOT_DIR}/versions.json" ]]; then
            printf '{}\n' > "${API_ROOT_DIR}/versions.json"
          fi

          jq \
            --arg version "${VERSION}" \
            --arg url "/${API_ROOT_DIR}/${VERSION}" \
            '. + {($version): $url}' \
            "${API_ROOT_DIR}/versions.json" > "${API_ROOT_DIR}/versions.json.tmp"
          mv "${API_ROOT_DIR}/versions.json.tmp" "${API_ROOT_DIR}/versions.json"

          rm -rf "${API_ROOT_DIR:?}/${VERSION}"
          mkdir -p "${API_ROOT_DIR}/${VERSION}"
          cp -a "${API_DOCS_DIR}/." "${API_ROOT_DIR}/${VERSION}/"

          has_release_version=false
          if jq -e 'keys[] | select(. != "latest")' versions.json >/dev/null 2>&1; then
            has_release_version=true
          fi

          if [[ "${VERSION}" != "latest" || "${has_release_version}" != "true" ]]; then
            rm -rf release
            cp -a "${VERSION}" release
            rm -rf "${API_ROOT_DIR}/release"
            cp -a "${API_ROOT_DIR}/${VERSION}" "${API_ROOT_DIR}/release"
          fi

          touch .nojekyll

          api_target="release"
          if [[ ! -d "${API_ROOT_DIR}/release" ]]; then
            api_target="${VERSION}"
          fi

          cat > "${API_ROOT_DIR}/index.html" <<EOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=/airbender-platform/${API_ROOT_DIR}/${api_target}/">
              <title>Redirecting to Airbender Platform Rust API Docs</title>
            </head>
            <body>
              <p><a href="/airbender-platform/${API_ROOT_DIR}/${api_target}/">Continue to the Rust API docs.</a></p>
            </body>
          </html>
          EOF

          git add .nojekyll release "${API_ROOT_DIR}"
          if git diff --cached --quiet; then
            exit 0
          fi

          git commit --amend -m "Deploy ${GITHUB_SHA::7}"
          git push --force --set-upstream origin gh-pages
