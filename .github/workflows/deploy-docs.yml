name: Deploy docs

on:
  push:
    branches:
      - "main"
    tags:
      - "v*.*.*"
    paths:
      - 'docs/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/deploy-docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag or commit to deploy the core docs. If empty, use the ref that triggered the workflow."
        required: false
        default: ""
      version:
        type: string
        description: "Version of the documentation to deploy"
        required: false
        default: "latest"

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  deploy-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DOCS_DIR: 'docs'
      API_DOCS_DIR: '${{ runner.temp }}/api-docs'
      API_ROOT_DIR: 'api'
      ENABLE_TESTS: false
      ZKSYNC_USE_CUDA_STUBS: 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref || '' }}

      - name: Install Rust toolchain
        uses: moonrepo/setup-rust@v1
        env:
          # To fix rate limiting issues with GitHub API
          GITHUB_TOKEN: ${{ github.token }}
        with:
          cache: false

      - name: Build Rust API docs
        if: |
          github.event_name == 'pull_request' ||
          github.ref_name == github.event.repository.default_branch ||
          (
            github.event_name == 'workflow_dispatch' &&
            (
              inputs.version == '' ||
              inputs.version == 'latest' ||
              inputs.version == github.event.repository.default_branch
            )
          )
        shell: 'bash -eu {0}'
        run: |
          rm -rf target/doc "${API_DOCS_DIR}"

          cargo doc --workspace --no-deps \
            --exclude airbender-host \
            --exclude cargo-airbender

          cargo doc -p airbender-host --no-deps \
            --no-default-features \
            --features docs-only

          cargo doc -p cargo-airbender --no-deps \
            --no-default-features \
            --features docs-only

          mkdir -p "${API_DOCS_DIR}"
          cp -a target/doc/. "${API_DOCS_DIR}/"
          rm -f "${API_DOCS_DIR}/.lock"

      - name: Publish Rust API docs
        if: |
          github.event_name != 'pull_request' &&
          (
            github.ref_name == github.event.repository.default_branch ||
            (
              github.event_name == 'workflow_dispatch' &&
              (
                inputs.version == '' ||
                inputs.version == 'latest' ||
                inputs.version == github.event.repository.default_branch
              )
            )
          )
        shell: 'bash -euxo pipefail {0}'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Deploy from CI"
          git config user.email ""

          if gh api "/repos/${GITHUB_REPOSITORY}/branches/gh-pages" > /dev/null 2>&1; then
            git fetch origin gh-pages
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
            git commit --allow-empty -m "Initialize gh-pages branch"
          fi

          rm -rf "${API_ROOT_DIR}"
          mkdir -p "${API_ROOT_DIR}"
          cp -a "${API_DOCS_DIR}/." "${API_ROOT_DIR}/"

          git add "${API_ROOT_DIR}"
          if git diff --cached --quiet; then
            exit 0
          fi

          git commit --amend -m "Deploy ${GITHUB_SHA::7}"
          git push --force --set-upstream origin gh-pages

      - name: Restore source checkout
        if: github.event_name != 'pull_request'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref || '' }}

      - name: Deploy docs
        uses: matter-labs/deploy-mdbooks@c72ae3825faeb7d20cbf3e67714f7253dd0ee7cb # v1
        with:
          version: ${{ inputs.version || github.ref_name }}
          docs-dir: ${{ env.DOCS_DIR }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          enable-tests: ${{ env.ENABLE_TESTS }}
          deploy: ${{ github.event_name != 'pull_request' }}
