name: Deploy docs

on:
  push:
    branches:
      - "main"
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag or commit to deploy the core docs. If empty, use the ref that triggered the workflow."
        required: false
        default: ""
      version:
        type: string
        description: "Version of the documentation to deploy"
        required: false
        default: "latest"

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy-docs:
    runs-on: matterlabs-ci-runner-high-performance
    permissions:
      contents: write
    env:
      CARGO_TERM_COLOR: always
      REQUESTED_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_type == 'tag' && github.ref_name || 'latest' }}
      PUBLISH_API: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
      RUST_TOOLCHAIN: nightly-2026-02-10
      ZKSYNC_USE_CUDA_STUBS: "true"
    steps:
      - name: Checkout source code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref || '' }}

      - name: Install Rust toolchain
        if: env.PUBLISH_API == 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rust-src,llvm-tools-preview

      - name: Build workspace rustdocs
        if: env.PUBLISH_API == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cargo doc --workspace --no-deps --locked

      - name: Generate workspace API landing page
        if: env.PUBLISH_API == 'true'
        run: |
          python3 scripts/generate_api_index.py \
            --workspace-root . \
            --template scripts/templates/api-index.html.template \
            --output target/doc/index.html

      - name: Deploy docs
        uses: matter-labs/deploy-mdbooks@e83f04651a9d422adefd17b2cba888e0df886fc6
        with:
          version: ${{ env.REQUESTED_VERSION }}
          docs-dir: docs
          github-token: ${{ secrets.GITHUB_TOKEN }}
          enable-tests: false
          additional-paths: ${{ env.PUBLISH_API == 'true' && 'target/doc=api' || '' }}
