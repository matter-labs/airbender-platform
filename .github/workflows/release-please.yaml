name: Release-please

# Give permissions to the release-please bot to open and update PRs
# and commit to PRs the repository to update Cargo.lock
permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-please:
    uses: matter-labs/zksync-ci-common/.github/workflows/release-please.yaml@v1
    secrets:
      slack_webhook: ${{ secrets.SLACK_WEBHOOK_RELEASES }}
      gh_token: ${{ secrets.GITHUB_TOKEN }}
    with:
      config: ".github/release-please/config.json"
      manifest: ".github/release-please/manifest.json"
      update-cargo-lock: true
      publish-to-crates-io: false
      upgrade-dependencies: false

  release:
    if: ${{ always() && needs.release-please.outputs.releases_created == 'true' }}
    needs: release-please
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
