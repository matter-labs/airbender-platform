[book]
authors = ["Matter Labs"]
language = "en"
src = "src"
title = "Airbender Platform"

[output.html]
smart-punctuation = true
git-repository-url = "https://github.com/matter-labs/airbender-platform/tree/main/docs"
edit-url-template = "https://github.com/matter-labs/airbender-platform/edit/main/docs/{path}"
additional-js = ["js/version-box.js"]
additional-css = ["css/version-box.css"]

[output.html.playground]
editable = true
line-numbers = true

[output.html.search]
limit-results = 20
use-boolean-and = true
boost-title = 2
boost-hierarchy = 2
boost-paragraph = 1
expand = true
heading-split-level = 2
